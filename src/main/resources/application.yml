spring:
  application:
    name: taskflow-ai
  jpa:
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:taskflow}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:taskflow}
    password: ${DB_PASSWORD:taskflow}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true


springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  show-actuator: true

resilience4j:
  ratelimiter:
    instances:
      agent-execute:
        limit-for-period: 10
        limit-refresh-period: 1s
        timeout-duration: 0s

taskflow:
  file-operation:
    whitelist-dir: /tmp/taskflow
  agent:
    max-steps: 10
    timeout-seconds: 60
    cache-enabled: true
    idempotency-enabled: true
  llm:
    provider: deepseek
    model: deepseek-v4-flash
    temperature: 0.7
    max-tokens: 2000
    api-key: ${LLM_API_KEY:}
    api-base-url: https://api.deepseek.com
  weather:
    api-key: ${WEATHER_API_KEY:}
    api-base-url: ${WEATHER_API_BASE_URL:https://api.weatherapi.com/v1/current.json}
  search:
    api-key: ${SEARCH_API_KEY:}
    api-base-url: ${SEARCH_API_BASE_URL:}
  auth:
    enabled: false
    header-name: X-API-Key
